<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT-1 · Virtual Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0D0C10; font-family: 'Inter', 'Helvetica Neue', sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ─── Tokens ───────────────────────────────────────────────────────────────────
const PINK       = "#E8187A";
const PINK_DARK  = "#B01060";
const PINK_GLOW  = "#FF40A0";
const BODY_BG    = "#D01070";
const BODY_SIDE  = "#A00858";
const PANEL      = "#111014";
const PANEL_HI   = "#1C1A20";
const PANEL_EDGE = "#2A2730";
const OLED_BG    = "#0A0A10";
const WHITE      = "#F0ECE8";
const DIM        = "#4A4655";
const TEXT_SEC   = "#8A8495";

const CAT = {
  osc:    { color: "#6B7FD7", label: "OSC" },
  filter: { color: "#5DB88A", label: "FILTER" },
  env:    { color: "#C47E4A", label: "ENV" },
  mod:    { color: "#9B6CC7", label: "MOD" },
  fx:     { color: "#4FA8BF", label: "FX" },
  macro:  { color: "#D4A84B", label: "MACRO" },
};

const BLOCKS = [
  { id: "classic_osc",   cat: "osc",    label: "Classic Osc",    params: ["SAW","PULSE","TRI","SUB"],              icon: "∿", oscType: "sawtooth" },
  { id: "wavetable_osc", cat: "osc",    label: "Wavetable Osc",  params: ["POSITION","WARP","SPREAD","LEVEL"],     icon: "∿", oscType: "sine"     },
  { id: "fm_op",         cat: "osc",    label: "FM Operator",    params: ["RATIO","FEEDBACK","MOD IDX","LEVEL"],   icon: "∿", oscType: "sine"     },
  { id: "sampler",       cat: "osc",    label: "Sampler",        params: ["START","END","LOOP","PITCH"],           icon: "▶", oscType: "square"   },

  // ── Four iconic filter types ──────────────────────────────────────────────
  { id: "moog_ladder",   cat: "filter", label: "Moog Ladder",    params: ["CUTOFF","RESONANCE","DRIVE","KEY TRK"], icon: "⊽", filterType: "moog"  },
  { id: "sem_svf",       cat: "filter", label: "Oberheim SEM",   params: ["CUTOFF","RESONANCE","MORPH","NOTCH"],   icon: "⊽", filterType: "sem"   },
  { id: "ms20_sk",       cat: "filter", label: "Korg MS-20",     params: ["CUTOFF","RESONANCE","PEAK","BITE"],     icon: "⊽", filterType: "ms20"  },
  { id: "tb303_diode",   cat: "filter", label: "Roland TB-303",  params: ["CUTOFF","RESONANCE","ACCENT","SAT"],    icon: "⊽", filterType: "tb303" },

  { id: "amp_env",       cat: "env",    label: "Amp Env",        params: ["ATTACK","DECAY","SUSTAIN","RELEASE"],   icon: "⋀" },
  { id: "filter_env",    cat: "env",    label: "Filter Env",     params: ["ATTACK","DECAY","SUSTAIN","RELEASE"],   icon: "⋀" },
  { id: "lfo",           cat: "mod",    label: "LFO 1",          params: ["RATE","DEPTH","SHAPE","PHASE"],         icon: "~",  lfoIndex: 1 },
  { id: "lfo2",          cat: "mod",    label: "LFO 2",          params: ["L2-RATE","L2-DEPTH","L2-SHAPE","PHASE"], icon: "~",  lfoIndex: 2 },
  { id: "route",         cat: "mod",    label: "Route",          params: ["SOURCE","DEST"],                         icon: "⇝",  isRouteBlock: true, encoderOnly: true },
  { id: "random",        cat: "mod",    label: "Random",         params: ["RATE","SMOOTHING","DEPTH"],              icon: "?" },
  { id: "delay",         cat: "fx",     label: "Delay",          params: ["TIME","FEEDBACK","MOD","MIX"],          icon: "◎" },
  { id: "reverb",        cat: "fx",     label: "Reverb",         params: ["SIZE","DECAY","DAMPING","MIX"],         icon: "◎" },
  { id: "juno60",        cat: "fx",     label: "Juno-60 Chorus", params: ["J-RATE","J-WIDTH"],                     icon: "〜", chorusType: "juno"  },
  { id: "rs09",          cat: "fx",     label: "RS-09 Chorus",   params: ["R-RATE","R-WIDTH"],                     icon: "〜", chorusType: "rs09"  },
  { id: "elec_mistress", cat: "fx",     label: "Elec Mistress",  params: ["E-RATE","E-WIDTH"],                     icon: "〜", chorusType: "mistress" },
];

// ─── Piano Keys ───────────────────────────────────────────────────────────────
const NOTE_PATTERN = [
  { type:"white", note:"C",  semi:0  }, { type:"black", note:"C#", semi:1  },
  { type:"white", note:"D",  semi:2  }, { type:"black", note:"D#", semi:3  },
  { type:"white", note:"E",  semi:4  }, { type:"white", note:"F",  semi:5  },
  { type:"black", note:"F#", semi:6  }, { type:"white", note:"G",  semi:7  },
  { type:"black", note:"G#", semi:8  }, { type:"white", note:"A",  semi:9  },
  { type:"black", note:"A#", semi:10 }, { type:"white", note:"B",  semi:11 },
];
function buildKeys() {
  const keys = [];
  for (let oct = 3; oct <= 5; oct++) {
    NOTE_PATTERN.forEach(({ type, note, semi }) => {
      const midi = (oct + 1) * 12 + semi;
      const freq = 440 * Math.pow(2, (midi - 69) / 12);
      keys.push({ type, note: `${note}${oct}`, freq, id: `${note}${oct}` });
    });
  }
  return keys.slice(0, 30);
}
const KEYS = buildKeys();

// ─── Audio Engine ─────────────────────────────────────────────────────────────
function createEngine() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const p = {
    attack:0.008, decay:0.12, sustain:0.6, release:0.25,
    cutoff:0.65, resonance:1.0, detune:0, lfoRate:2,
    reverbMix:0.2, delayTime:0.35, delayFb:0.4,
    drive:1.0, oscLevel:0.4,
  };
  const masterGain = ctx.createGain(); masterGain.gain.value = 0.7;
  masterGain.connect(ctx.destination);

  // ── Switchable filter graph ───────────────────────────────────────────────
  // All topologies live between filterInput and filterOutput.
  // noteOn always feeds filterInput; chain after filterOutput.
  const filterInput  = ctx.createGain(); filterInput.gain.value  = 1;
  const filterOutput = ctx.createGain(); filterOutput.gain.value = 1;

  // Helper: soft-clip waveshaper (tanh approximation)
  function makeClipper(amount = 1) {
    const ws = ctx.createWaveShaper();
    const n = 256; const curve = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = Math.tanh(x * amount);
    }
    ws.curve = curve; ws.oversample = "2x";
    return ws;
  }

  // ── Moog Ladder: two 12dB lowpass stages in series + saturation ──────────
  const moogStage1  = ctx.createBiquadFilter(); moogStage1.type = "lowpass";
  const moogStage2  = ctx.createBiquadFilter(); moogStage2.type = "lowpass";
  const moogClipper = makeClipper(2);
  const moogIn      = ctx.createGain();
  const moogOut     = ctx.createGain();
  moogIn.connect(moogClipper); moogClipper.connect(moogStage1);
  moogStage1.connect(moogStage2); moogStage2.connect(moogOut);

  // ── Oberheim SEM: lowpass + notch blend (SVF character) ──────────────────
  const semLP    = ctx.createBiquadFilter(); semLP.type    = "lowpass";
  const semNotch = ctx.createBiquadFilter(); semNotch.type = "notch";
  const semLPGain    = ctx.createGain(); semLPGain.gain.value    = 0.7;
  const semNotchGain = ctx.createGain(); semNotchGain.gain.value = 0.3; // morph target
  const semIn = ctx.createGain(); const semOut = ctx.createGain();
  semIn.connect(semLP);    semLP.connect(semLPGain);       semLPGain.connect(semOut);
  semIn.connect(semNotch); semNotch.connect(semNotchGain); semNotchGain.connect(semOut);

  // ── Korg MS-20: two stages with inter-stage hard clipper (aggressive) ────
  const ms20Stage1  = ctx.createBiquadFilter(); ms20Stage1.type = "lowpass";
  const ms20Stage2  = ctx.createBiquadFilter(); ms20Stage2.type = "lowpass";
  const ms20Clip    = makeClipper(8); // harsh inter-stage distortion
  const ms20Peak    = ctx.createBiquadFilter(); ms20Peak.type = "peaking";
  ms20Peak.frequency.value = 2000; ms20Peak.gain.value = 6; ms20Peak.Q.value = 3;
  const ms20In = ctx.createGain(); const ms20Out = ctx.createGain();
  ms20In.connect(ms20Stage1); ms20Stage1.connect(ms20Clip);
  ms20Clip.connect(ms20Stage2); ms20Stage2.connect(ms20Peak); ms20Peak.connect(ms20Out);

  // ── Roland TB-303: lowpass + accent bandpass boost near cutoff ───────────
  const tb303LP     = ctx.createBiquadFilter(); tb303LP.type = "lowpass";
  const tb303BP     = ctx.createBiquadFilter(); tb303BP.type = "bandpass";
  const tb303HPout  = ctx.createBiquadFilter(); tb303HPout.type = "highpass";
  tb303HPout.frequency.value = 40; // remove sub rumble
  const tb303BPGain = ctx.createGain(); tb303BPGain.gain.value = 0.3; // accent amount
  const tb303Sat    = makeClipper(1.5);
  const tb303In = ctx.createGain(); const tb303Out = ctx.createGain();
  tb303In.connect(tb303Sat); tb303Sat.connect(tb303LP);
  tb303LP.connect(tb303HPout); tb303HPout.connect(tb303Out);
  tb303In.connect(tb303BP);   tb303BP.connect(tb303BPGain); tb303BPGain.connect(tb303Out);

  // Topology registry — keyed by filterType string
  const TOPOS = {
    moog:  { in: moogIn,   out: moogOut  },
    sem:   { in: semIn,    out: semOut   },
    ms20:  { in: ms20In,   out: ms20Out  },
    tb303: { in: tb303In,  out: tb303Out },
  };

  // filterChain: ordered array of active filterType strings, max 2
  let filterChain = [];

  function rebuildFilterChain() {
    // Disconnect everything between filterInput and filterOutput
    try { filterInput.disconnect(); } catch(e) {}
    Object.values(TOPOS).forEach(t => {
      try { t.out.disconnect(); } catch(e) {}
    });

    if (filterChain.length === 0) {
      // Bypass: filterInput → filterOutput directly
      filterInput.connect(filterOutput);
      return;
    }
    if (filterChain.length === 1) {
      const t = TOPOS[filterChain[0]];
      filterInput.connect(t.in);
      t.out.connect(filterOutput);
      return;
    }
    // Two filters in series
    const t0 = TOPOS[filterChain[0]];
    const t1 = TOPOS[filterChain[1]];
    filterInput.connect(t0.in);
    t0.out.connect(t1.in);
    t1.out.connect(filterOutput);
  }

  // Public: add/replace filters in chain. Called from App when blocks change.
  function setFilterChain(types) {
    // types = [] | ["moog"] | ["moog","sem"] etc — max 2
    filterChain = types.slice(0, 2).filter(t => TOPOS[t]);
    rebuildFilterChain();
  }

  // Update freq/Q only on nodes that are in the active chain
  function setFilterFreqs(hz, q) {
    if (filterChain.includes("moog"))  { [moogStage1,moogStage2].forEach(f=>{f.frequency.value=hz;f.Q.value=q*6;}); }
    if (filterChain.includes("sem"))   { [semLP,semNotch].forEach(f=>{f.frequency.value=hz;f.Q.value=q*8;}); }
    if (filterChain.includes("ms20"))  { [ms20Stage1,ms20Stage2].forEach(f=>{f.frequency.value=hz;f.Q.value=q*12;}); ms20Peak.frequency.value=Math.min(hz*1.5,18000); }
    if (filterChain.includes("tb303")) { [tb303LP,tb303BP].forEach(f=>{f.frequency.value=hz;f.Q.value=q*10;}); tb303BP.frequency.value=Math.min(hz*1.2,18000); }
    // If no filters active yet, update all so they're ready when added
    if (filterChain.length === 0) {
      [moogStage1,moogStage2].forEach(f=>{f.frequency.value=hz;f.Q.value=q*6;});
      [semLP,semNotch].forEach(f=>{f.frequency.value=hz;f.Q.value=q*8;});
      [ms20Stage1,ms20Stage2].forEach(f=>{f.frequency.value=hz;f.Q.value=q*12;});
      [tb303LP,tb303BP].forEach(f=>{f.frequency.value=hz;f.Q.value=q*10;});
    }
  }

  rebuildFilterChain(); // start bypassed

  // ── FX chain after filterOutput ───────────────────────────────────────────
  const convolver = ctx.createConvolver();
  const reverbGain = ctx.createGain(); reverbGain.gain.value = 0.2;
  const dryGain    = ctx.createGain(); dryGain.gain.value    = 0.8;
  const irLen = ctx.sampleRate * 2.5;
  const ir = ctx.createBuffer(2, irLen, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/irLen,2.5);
  }
  convolver.buffer = ir;
  const delayNode    = ctx.createDelay(2.0); delayNode.delayTime.value = p.delayTime;
  const delayFbGain  = ctx.createGain();     delayFbGain.gain.value    = p.delayFb;
  const delayMixGain = ctx.createGain();     delayMixGain.gain.value   = 0;
  filterOutput.connect(dryGain);
  filterOutput.connect(convolver); convolver.connect(reverbGain);
  filterOutput.connect(delayMixGain); delayMixGain.connect(delayNode);
  delayNode.connect(delayFbGain); delayFbGain.connect(delayNode);
  delayNode.connect(masterGain);
  dryGain.connect(masterGain); reverbGain.connect(masterGain);

  // ── Helper: build one BBD chorus voice ────────────────────────────────────
  function buildChorusVoice(baseDelayMs, lfoHz, lfoDepthMs, feedback = 0) {
    const baseS  = baseDelayMs / 1000;
    const depthS = lfoDepthMs  / 1000;

    const delayL = ctx.createDelay(0.05); delayL.delayTime.value = baseS;
    const delayR = ctx.createDelay(0.05); delayR.delayTime.value = baseS;

    // Single LFO, inverted for R channel to create stereo width
    const lfo = ctx.createOscillator(); lfo.type = "sine"; lfo.frequency.value = lfoHz;
    const lfoGainL = ctx.createGain(); lfoGainL.gain.value =  depthS;
    const lfoGainR = ctx.createGain(); lfoGainR.gain.value = -depthS; // inverted = stereo spread
    lfo.connect(lfoGainL); lfoGainL.connect(delayL.delayTime);
    lfo.connect(lfoGainR); lfoGainR.connect(delayR.delayTime);
    lfo.start();

    // Feedback
    const fbGainL = ctx.createGain(); fbGainL.gain.value = feedback;
    const fbGainR = ctx.createGain(); fbGainR.gain.value = feedback;
    delayL.connect(fbGainL); fbGainL.connect(delayL);
    delayR.connect(fbGainR); fbGainR.connect(delayR);

    // Wet outputs — gain 0 until enabled, connect directly to masterGain
    const wetL = ctx.createGain(); wetL.gain.value = 0;
    const wetR = ctx.createGain(); wetR.gain.value = 0;
    delayL.connect(wetL); wetL.connect(masterGain);
    delayR.connect(wetR); wetR.connect(masterGain);

    return { delayL, delayR, lfo, lfoGainL, lfoGainR, wetL, wetR, fbGainL, fbGainR };
  }

  // ── Juno-60 Chorus ────────────────────────────────────────────────────────
  // Character: lush, wide, slightly wobbly BBD. ~7ms base, ~0.5Hz mod.
  // Two parallel voices for Mode I + Mode II blend.
  const juno = buildChorusVoice(7.0, 0.5, 1.8, 0.0);
  const juno2 = buildChorusVoice(7.2, 0.83, 2.1, 0.0); // Mode II voice
  // Feed filterOutput into both juno delay lines
  filterOutput.connect(juno.delayL);  filterOutput.connect(juno.delayR);
  filterOutput.connect(juno2.delayL); filterOutput.connect(juno2.delayR);

  // ── Roland RS-09 Chorus ───────────────────────────────────────────────────
  // Character: warm, slow, subtle. Shorter delay, lower rate — string ensemble thickening.
  const rs09 = buildChorusVoice(3.5, 0.28, 0.9, 0.0);
  filterOutput.connect(rs09.delayL); filterOutput.connect(rs09.delayR);

  // ── EHX Electric Mistress (Flanger) ───────────────────────────────────────
  // Character: metallic, sweeping, jet-plane. Very short delay (1–5ms), strong feedback.
  const mistress = buildChorusVoice(2.5, 0.35, 2.0, 0.55);
  filterOutput.connect(mistress.delayL); filterOutput.connect(mistress.delayR);

  // Setters for each chorus — RATE maps to lfoHz, WIDTH maps to stereo depth
  function setChorusRate(voice, hz) {
    voice.lfo.frequency.setTargetAtTime(hz, ctx.currentTime, 0.1);
  }
  function setChorusWidth(voice, depth, baseDepth) {
    const depthS = (baseDepth * depth) / 1000;
    voice.lfoGainL.gain.setTargetAtTime( depthS, ctx.currentTime, 0.05);
    voice.lfoGainR.gain.setTargetAtTime(-depthS, ctx.currentTime, 0.05);
  }
  function enableChorus(voice, on, wetLevel = 0.45) {
    voice.wetL.gain.setTargetAtTime(on ? wetLevel : 0, ctx.currentTime, 0.05);
    voice.wetR.gain.setTargetAtTime(on ? wetLevel : 0, ctx.currentTime, 0.05);
  }
  // ── LFO Factory — builds a self-contained LFO with switchable destination ──
  function buildLfo() {
    const osc = ctx.createOscillator(); osc.type = "sine"; osc.frequency.value = 2;
    // Per-destination gain nodes
    const pitchGain  = ctx.createGain(); pitchGain.gain.value  = 0;
    const volGain    = ctx.createGain(); volGain.gain.value    = 0;
    const cut1Gain   = ctx.createGain(); cut1Gain.gain.value   = 0;
    const cut2Gain   = ctx.createGain(); cut2Gain.gain.value   = 0;
    const res1Gain   = ctx.createGain(); res1Gain.gain.value   = 0;
    const res2Gain   = ctx.createGain(); res2Gain.gain.value   = 0;
    const delayGain  = ctx.createGain(); delayGain.gain.value  = 0;
    const chorusGain = ctx.createGain(); chorusGain.gain.value = 0;
    osc.connect(pitchGain);
    osc.connect(volGain);    volGain.connect(masterGain.gain);
    osc.connect(cut1Gain);   // connected to filter freqs in applyRoutes
    osc.connect(cut2Gain);
    osc.connect(res1Gain);
    osc.connect(res2Gain);
    osc.connect(delayGain);  delayGain.connect(delayNode.delayTime);
    osc.connect(chorusGain); // chorus depth — connected per-voice in applyRoutes
    osc.start();
    return {
      osc, pitchGain, volGain, cut1Gain, cut2Gain, res1Gain, res2Gain, delayGain, chorusGain,
      depth: 0, dest: "PITCH", noteFreqParams: [], // populated per noteOn
    };
  }

  const lfo1 = buildLfo();
  const lfo2 = buildLfo();
  const LFOS = [lfo1, lfo2];

  // Connect an LFO's pitchGain to a specific note's oscillator frequency params
  function connectLfoPitch(lfoObj, freqParams) {
    freqParams.forEach(fp => { try { lfoObj.pitchGain.connect(fp); } catch(e) {} });
  }

  // Apply a full routes array → connect correct LFO gains to correct destinations
  // routes = [{ source:"LFO1"|"LFO2"|"ENV1"|"ENV2", dest:"PITCH"|"VOLUME"|"CUT-1"|... }, ...]
  let currentRoutes = []; // stored so DEPTH setters can re-apply without needing React state
  function applyRoutes(routes) {
    currentRoutes = routes || [];
    // Reset all modulation gains to 0
    LFOS.forEach(l => {
      [l.pitchGain,l.volGain,l.cut1Gain,l.cut2Gain,l.res1Gain,l.res2Gain,l.delayGain,l.chorusGain]
        .forEach(g => g.gain.setTargetAtTime(0, ctx.currentTime, 0.02));
    });
    // Apply each route, reading depth from the LFO object itself
    currentRoutes.forEach(({ source, dest }) => {
      const lfoObj = source === "LFO1" ? lfo1 : source === "LFO2" ? lfo2 : null;
      if (!lfoObj) return;
      const d = lfoObj.depth ?? 0.5; // read live depth from LFO object
      if (dest === "PITCH")   lfoObj.pitchGain.gain.setTargetAtTime(d * 80,  ctx.currentTime, 0.02);
      if (dest === "VOLUME")  lfoObj.volGain.gain.setTargetAtTime(d * 0.3,   ctx.currentTime, 0.02);
      if (dest === "CUT-1") {
        const nodes = filterChain[0] ? getFilterNodes(filterChain[0]) : [];
        nodes.forEach(f => { try { lfoObj.cut1Gain.connect(f.frequency); } catch(e){} });
        lfoObj.cut1Gain.gain.setTargetAtTime(d * 1200, ctx.currentTime, 0.02);
      }
      if (dest === "CUT-2") {
        const nodes = filterChain[1] ? getFilterNodes(filterChain[1]) : [];
        nodes.forEach(f => { try { lfoObj.cut2Gain.connect(f.frequency); } catch(e){} });
        lfoObj.cut2Gain.gain.setTargetAtTime(d * 1200, ctx.currentTime, 0.02);
      }
      if (dest === "RES-1") {
        const nodes = filterChain[0] ? getFilterNodes(filterChain[0]) : [];
        nodes.forEach(f => { try { lfoObj.res1Gain.connect(f.Q); } catch(e){} });
        lfoObj.res1Gain.gain.setTargetAtTime(d * 6, ctx.currentTime, 0.02);
      }
      if (dest === "RES-2") {
        const nodes = filterChain[1] ? getFilterNodes(filterChain[1]) : [];
        nodes.forEach(f => { try { lfoObj.res2Gain.connect(f.Q); } catch(e){} });
        lfoObj.res2Gain.gain.setTargetAtTime(d * 6, ctx.currentTime, 0.02);
      }
      if (dest === "DELAY")  lfoObj.delayGain.gain.setTargetAtTime(d * 0.08, ctx.currentTime, 0.02);
      if (dest === "CHORUS") lfoObj.chorusGain.gain.setTargetAtTime(d * 0.003, ctx.currentTime, 0.02);
    });
  }

  function getFilterNodes(type) {
    if (type === "moog")  return [moogStage1, moogStage2];
    if (type === "sem")   return [semLP, semNotch];
    if (type === "ms20")  return [ms20Stage1, ms20Stage2];
    if (type === "tb303") return [tb303LP, tb303BP];
    return [];
  }

  // Legacy compat: keep RATE/DEPTH/SHAPE setters pointing at lfo1
  const lfo = lfo1.osc; // alias for setters below
  let lfoDepthValue = 0;
  let lfoDestination = "PITCH";
  function setLfoDest(dest) { lfoDestination = dest; } // kept for DEST block compat
  function setLfoDestination(dest) { setLfoDest(dest); }
  // Per-oscillator mix levels for Classic Osc
  const mix = { saw: 0.5, pulse: 0.0, tri: 0.0, sub: 0.0 };

  const activeNotes = {};
  function noteOn(freq, oscType = "sawtooth") {
    if (ctx.state === "suspended") ctx.resume();
    if (activeNotes[freq]) noteOff(freq);

    const envGain = ctx.createGain();
    envGain.connect(filterInput);
    const noteData = { envGain, oscs: [] };

    if (oscType === "classic") {
      // Four separate oscillators, each with its own gain
      const defs = [
        { type:"sawtooth", gainVal: mix.saw  },
        { type:"square",   gainVal: mix.pulse },
        { type:"triangle", gainVal: mix.tri   },
        { type:"sawtooth", gainVal: mix.sub, detuneSemis: -12 }, // sub oct
      ];
      defs.forEach(def => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = def.type;
        o.frequency.value = freq;
        o.detune.value = (def.detuneSemis || 0) * 100 + p.detune * 100;
        g.gain.value = def.gainVal * p.drive;
        lfo1.pitchGain.connect(o.frequency);
        lfo2.pitchGain.connect(o.frequency);
        o.connect(g); g.connect(envGain);
        o.start(); 
        noteData.oscs.push({ osc: o, gainNode: g, role: def.detuneSemis ? "sub" : def.type });
      });
    } else {
      const osc = ctx.createOscillator();
      osc.type = oscType; osc.frequency.value = freq;
      osc.detune.value = p.detune * 100;
      const g = ctx.createGain(); g.gain.value = 0.4 * p.drive;
      lfo1.pitchGain.connect(osc.frequency);
      lfo2.pitchGain.connect(osc.frequency);
      osc.connect(g); g.connect(envGain);
      osc.start();
      noteData.oscs.push({ osc, gainNode: g, role: oscType });
    }

    const atk = Math.max(0.001, p.attack);
    const dec = Math.max(0.01,  p.decay);
    const sus = Math.max(0.001, p.sustain);
    const now = ctx.currentTime;
    envGain.gain.setValueAtTime(0, now);
    envGain.gain.linearRampToValueAtTime(1.0,       now + atk);
    envGain.gain.linearRampToValueAtTime(sus,        now + atk + dec);
    const hz = 100 * Math.pow(180, p.cutoff);
    setFilterFreqs(hz, p.resonance);
    activeNotes[freq] = noteData;
  }

  function noteOff(freq) {
    const note = activeNotes[freq]; if (!note) return;
    const rel = Math.max(0.01, p.release);
    const now = ctx.currentTime;
    note.envGain.gain.cancelScheduledValues(now);
    note.envGain.gain.setValueAtTime(note.envGain.gain.value, now);
    note.envGain.gain.linearRampToValueAtTime(0, now + rel);
    const stopAt = now + rel + 0.01;
    note.oscs.forEach(({ osc }) => osc.stop(stopAt));
    delete activeNotes[freq];
  }

  // Live-update mix gains on all active notes
  function updateMixGains() {
    Object.values(activeNotes).forEach(note => {
      note.oscs.forEach(({ gainNode, role }) => {
        const v = role === "sawtooth" ? mix.saw
                : role === "square"   ? mix.pulse
                : role === "triangle" ? mix.tri
                : role === "sub"      ? mix.sub : 0.4;
        gainNode.gain.setTargetAtTime(v * p.drive, ctx.currentTime, 0.02);
      });
    });
  }

  const setters = {
    ATTACK:       v => { p.attack    = 0.001 + v * 3.0; },
    DECAY:        v => { p.decay     = 0.01  + v * 2.0; },
    SUSTAIN:      v => { p.sustain   = v; },
    RELEASE:      v => { p.release   = 0.01  + v * 4.0; },
    CUTOFF:       v => { p.cutoff = v; const hz = 100*Math.pow(180,v); setFilterFreqs(hz, p.resonance); },
    RESONANCE:    v => { p.resonance = v; const hz = 100*Math.pow(180,p.cutoff); setFilterFreqs(hz,v); },
    // Moog-specific
    DRIVE:        v => { p.drive = 0.2 + v * 3; updateMixGains(); },
    "KEY TRK":    v => {},
    // SEM-specific: Morph blends LP→Notch
    MORPH:        v => { semLPGain.gain.setTargetAtTime(1-v*0.8, ctx.currentTime, 0.02); semNotchGain.gain.setTargetAtTime(v*0.8, ctx.currentTime, 0.02); },
    NOTCH:        v => { semNotchGain.gain.setTargetAtTime(v, ctx.currentTime, 0.02); },
    // MS-20-specific
    PEAK:         v => { ms20Peak.gain.value = v * 18; },
    BITE:         v => { const c = makeClipper(1 + v * 12); /* rebuild curve */ ms20Clip.curve = c.curve; },
    // TB-303-specific
    ACCENT:       v => { tb303BPGain.gain.setTargetAtTime(v * 0.8, ctx.currentTime, 0.02); },
    SAT:          v => { const c = makeClipper(0.5 + v * 4); tb303Sat.curve = c.curve; },
    SAW:          v => { mix.saw   = v; updateMixGains(); },
    PULSE:        v => { mix.pulse = v; updateMixGains(); },
    TRI:          v => { mix.tri   = v; updateMixGains(); },
    SUB:          v => { mix.sub   = v * 0.7; updateMixGains(); },
    LEVEL:        v => { p.oscLevel = 0.1 + v * 0.5; },
    POSITION:     v => {},
    WARP:         v => {},
    SPREAD:       v => {},
    PITCH:        v => { p.detune    = (v - 0.5) * 24; },
    RATIO:        v => { p.detune    = (v - 0.5) * 24; },
    "MOD IDX":    v => { lfo1.pitchGain.gain.setTargetAtTime(v * 80, ctx.currentTime, 0.02); },
    START:        v => {},
    END:          v => {},
    LOOP:         v => {},
    FEEDBACK:     v => { p.delayFb = v * 0.92; delayFbGain.gain.setTargetAtTime(p.delayFb, ctx.currentTime, 0.05); },
    RATE:         v => { p.lfoRate = 0.05 + v * 19.95; lfo1.osc.frequency.value = p.lfoRate; },
    "L2-RATE":    v => { lfo2.osc.frequency.value = 0.05 + v * 19.95; },
    DEPTH:        v => { lfo1.depth = v; applyRoutes(currentRoutes); },
    "L2-DEPTH":   v => { lfo2.depth = v; applyRoutes(currentRoutes); },
    SHAPE:        v => { lfo1.osc.type = ["sine","triangle","sawtooth","square"][Math.floor(v*3.99)]; },
    "L2-SHAPE":   v => { lfo2.osc.type = ["sine","triangle","sawtooth","square"][Math.floor(v*3.99)]; },
    PHASE:        v => {},
    SMOOTHING:    v => {},
    TIME:         v => { p.delayTime = 0.05 + v * 1.5; delayNode.delayTime.setTargetAtTime(p.delayTime, ctx.currentTime, 0.05); },
    MOD:          v => {},
    MIX:          v => { delayMixGain.gain.setTargetAtTime(v*0.7, ctx.currentTime, 0.05); reverbGain.gain.setTargetAtTime(v*0.5, ctx.currentTime, 0.05); },
    SIZE:         v => { reverbGain.gain.setTargetAtTime(v * 0.6, ctx.currentTime, 0.05); },
    DAMPING:      v => { reverbGain.gain.setTargetAtTime(v * 0.5, ctx.currentTime, 0.05); },
    WIDTH:        v => {},
    // ── Juno-60 Chorus ──
    "J-RATE":     v => { const hz = 0.1 + v * 1.5;  setChorusRate(juno, hz); setChorusRate(juno2, hz * 1.66); },
    "J-WIDTH":    v => { setChorusWidth(juno, v, 3.5); setChorusWidth(juno2, v, 4.0); },
    // ── RS-09 Chorus ──
    "R-RATE":     v => { setChorusRate(rs09, 0.1 + v * 0.6); },
    "R-WIDTH":    v => { setChorusWidth(rs09, v, 2.0); },
    // ── Electric Mistress ──
    "E-RATE":     v => { setChorusRate(mistress, 0.05 + v * 0.8); },
    "E-WIDTH":    v => { setChorusWidth(mistress, v, 4.5); mistress.fbGainL.gain.setTargetAtTime(0.3 + v * 0.55, ctx.currentTime, 0.05); mistress.fbGainR.gain.setTargetAtTime(0.3 + v * 0.55, ctx.currentTime, 0.05); },
    "ENV AMT":    v => { p.sustain   = v; },
    "LFO RATE":   v => { p.lfoRate   = 0.05 + v * 19.95; lfo.frequency.value = p.lfoRate; },
    "DELAY TIME": v => { p.delayTime = 0.05 + v * 1.5; delayNode.delayTime.setTargetAtTime(p.delayTime, ctx.currentTime, 0.05); },
    REVERB:       v => { reverbGain.gain.setTargetAtTime(v * 0.6, ctx.currentTime, 0.05); },
    VOLUME:       v => { masterGain.gain.setTargetAtTime(0.1 + v * 0.9, ctx.currentTime, 0.02); },
  };
  function enableDelay(on) { delayMixGain.gain.setTargetAtTime(on ? 0.4 : 0, ctx.currentTime, 0.05); }
  function activateChorus(type, on) {
    if (type === "juno")     { enableChorus(juno, on, 0.4); enableChorus(juno2, on, 0.3); }
    if (type === "rs09")     { enableChorus(rs09, on, 0.45); }
    if (type === "mistress") { enableChorus(mistress, on, 0.5); }
  }
  function setParam(label, val) { const fn = setters[label]; if (fn) fn(val); }
  return { ctx, noteOn, noteOff, setParam, setFilterChain, applyRoutes, enableDelay, activateChorus };
}

// ─── RouteKnob ────────────────────────────────────────────────────────────────
// Two stepped selectors (SOURCE → DEST) rendered as a single encoder-zone widget.
// Occupies two adjacent encoder slots.
const ROUTE_SOURCES = ["LFO1","LFO2","ENV1","ENV2"];
const ROUTE_DESTS   = ["PITCH","VOLUME","CUT-1","CUT-2","RES-1","RES-2","DELAY","CHORUS"];
const ROUTE_SRC_COLORS  = { LFO1:"#9B6CC7", LFO2:"#6B7FD7", ENV1:"#C47E4A", ENV2:"#5DB88A" };
const ROUTE_DEST_COLORS = { PITCH:"#6B7FD7", VOLUME:"#C47E4A", "CUT-1":"#5DB88A", "CUT-2":"#3D9870",
                             "RES-1":"#9B6CC7", "RES-2":"#7A4FA8", DELAY:"#4FA8BF", CHORUS:"#3A8AA0" };

function SteppedKnob({ options, value, onChange, colors, label }) {
  const size = 36; const cx = size/2; const r = cx - 5;
  const n = options.length;
  const idx = Math.round(value * (n-1));
  const opt = options[idx];
  const color = colors[opt] || DIM;
  const angle = -135 + (idx/(n-1))*270;
  const rad = angle*Math.PI/180;
  const dotX = cx + r*Math.sin(rad);
  const dotY = cx - r*Math.cos(rad);
  const startRef = useRef(null);
  const [flash, setFlash] = useState(false);
  const prevIdx = useRef(idx);

  useEffect(()=>{
    if(idx!==prevIdx.current){ prevIdx.current=idx; setFlash(true); setTimeout(()=>setFlash(false),400); }
  },[idx]);

  const snap = raw => Math.round(Math.max(0,Math.min(1,raw))*(n-1))/(n-1);
  const onMouseDown = e => {
    e.preventDefault(); startRef.current={y:e.clientY,value};
    const mv = e2=>{ if(startRef.current) onChange(snap(startRef.current.value+(startRef.current.y-e2.clientY)/90)); };
    const up = ()=>{ startRef.current=null; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  };
  const onTouchStart=e=>{ e.preventDefault(); startRef.current={y:e.touches[0].clientY,value}; };
  const onTouchMove=e=>{ if(!startRef.current)return; e.preventDefault(); onChange(snap(startRef.current.value+(startRef.current.y-e.touches[0].clientY)/90)); };
  const onWheel=e=>{ e.preventDefault(); onChange(snap(idx/(n-1)+(e.deltaY>0?-1:1)/(n-1))); };

  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3,userSelect:"none" }}>
      <svg width={size} height={size} style={{ cursor:"ns-resize",touchAction:"none" }}
        onMouseDown={onMouseDown} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={()=>{startRef.current=null;}} onWheel={onWheel}>
        <defs><radialGradient id={`rg_${label}`} cx="35%" cy="30%" r="70%"><stop offset="0%" stopColor="#3A3840"/><stop offset="100%" stopColor="#18161C"/></radialGradient></defs>
        <circle cx={cx} cy={cx} r={cx-1} fill={`url(#rg_${label})`} stroke={color} strokeWidth="1.5" style={{filter:`drop-shadow(0 0 4px ${color}55)`,transition:"stroke 0.2s"}}/>
        {options.map((_,i)=>{
          const a=((-135+(i/(n-1))*270)*Math.PI/180);
          const x1=cx+(cx-4)*Math.sin(a); const y1=cx-(cx-4)*Math.cos(a);
          const x2=cx+(cx-8)*Math.sin(a); const y2=cx-(cx-8)*Math.cos(a);
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={i===idx?color:DIM} strokeWidth={i===idx?2:1} style={{transition:"stroke 0.15s"}}/>;
        })}
        <circle cx={cx} cy={cx} r={r} fill="none" stroke="#222" strokeWidth="1.5"/>
        <circle cx={dotX} cy={dotY} r="3" fill={color} style={{filter:`drop-shadow(0 0 3px ${color})`,transition:"fill 0.2s"}}/>
        <circle cx={cx} cy={cx} r="4" fill={color+"33"} stroke={color} strokeWidth="1" style={{transition:"all 0.2s"}}/>
      </svg>
      <div style={{ background:OLED_BG, border:`1px solid ${flash?color:color+"55"}`, borderRadius:3, padding:"2px 4px", minWidth:44, textAlign:"center", boxShadow:flash?`0 0 8px ${color}88`:"none", transition:"all 0.2s" }}>
        <div style={{ fontSize:6,color:DIM,letterSpacing:"0.1em",textTransform:"uppercase" }}>{label}</div>
        <div style={{ fontFamily:"monospace",fontSize:9,fontWeight:700,color:flash?color:color+"CC",letterSpacing:"0.05em",transition:"color 0.2s" }}>{opt}</div>
      </div>
    </div>
  );
}

function RouteKnob({ sourceVal, destVal, onSourceChange, onDestChange }) {
  // Hold internal state so the knobs feel instant regardless of prop update latency
  const [src, setSrc] = useState(sourceVal);
  const [dst, setDst] = useState(destVal);

  const handleSrcChange = v => { setSrc(v); onSourceChange(v); };
  const handleDstChange = v => { setDst(v); onDestChange(v); };

  const srcIdx  = Math.round(src*(ROUTE_SOURCES.length-1));
  const dstIdx  = Math.round(dst*(ROUTE_DESTS.length-1));
  const srcColor = ROUTE_SRC_COLORS[ROUTE_SOURCES[srcIdx]] || DIM;
  const dstColor = ROUTE_DEST_COLORS[ROUTE_DESTS[dstIdx]]  || DIM;
  return (
    <div style={{ display:"flex",alignItems:"center",gap:6,padding:"4px 6px",background:PANEL_HI,border:`1px solid ${PANEL_EDGE}`,borderRadius:6 }}>
      <SteppedKnob options={ROUTE_SOURCES} value={src} onChange={handleSrcChange} colors={ROUTE_SRC_COLORS} label="SOURCE"/>
      <svg width={28} height={20} style={{ flexShrink:0 }}>
        <defs>
          <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stopColor={srcColor} stopOpacity="0.8"/>
            <stop offset="100%" stopColor={dstColor} stopOpacity="0.8"/>
          </linearGradient>
        </defs>
        <line x1="2" y1="10" x2="22" y2="10" stroke="url(#arrowGrad)" strokeWidth="1.5"/>
        <polygon points="22,6 28,10 22,14" fill={dstColor} opacity="0.8"/>
      </svg>
      <SteppedKnob options={ROUTE_DESTS} value={dst} onChange={handleDstChange} colors={ROUTE_DEST_COLORS} label="DEST"/>
    </div>
  );
}

// ─── DestKnob ─────────────────────────────────────────────────────────────────
// A stepped 4-position rotary selector. Turns to snap through PITCH/VOLUME/CUTOFF/RESO.
const DEST_OPTIONS = ["PITCH", "VOLUME", "CUTOFF", "RESO"];
const DEST_COLORS  = { PITCH:"#6B7FD7", VOLUME:"#C47E4A", CUTOFF:"#5DB88A", RESO:"#9B6CC7" };

function DestKnob({ value, onChange, color }) {
  const size    = 52;
  const cx      = size / 2;
  const r       = cx - 6;
  const numDest = DEST_OPTIONS.length;
  const stepIdx = Math.round(value * (numDest - 1));
  const dest    = DEST_OPTIONS[stepIdx];
  const destColor = DEST_COLORS[dest];

  // Map stepIdx → angle: spread across -135° to +135°
  const angle   = -135 + (stepIdx / (numDest - 1)) * 270;
  const rad     = angle * Math.PI / 180;
  const dotX    = cx + r * Math.sin(rad);
  const dotY    = cx - r * Math.cos(rad);

  // Flash state for OLED label
  const [flash, setFlash] = useState(false);
  const prevIdx = useRef(stepIdx);
  useEffect(() => {
    if (stepIdx !== prevIdx.current) {
      prevIdx.current = stepIdx;
      setFlash(true);
      const t = setTimeout(() => setFlash(false), 500);
      return () => clearTimeout(t);
    }
  }, [stepIdx]);

  // Drag to turn — snaps to nearest detent
  const startRef = useRef(null);
  const onMouseDown = e => {
    e.preventDefault();
    startRef.current = { y: e.clientY, value };
    const onMove = e2 => {
      if (!startRef.current) return;
      const raw = startRef.current.value + (startRef.current.y - e2.clientY) / 100;
      const clamped = Math.max(0, Math.min(1, raw));
      // Snap to nearest step
      const snapped = Math.round(clamped * (numDest - 1)) / (numDest - 1);
      onChange(snapped);
    };
    const onUp = () => { startRef.current = null; window.removeEventListener("mousemove", onMove); window.removeEventListener("mouseup", onUp); };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
  };
  const onTouchStart = e => { e.preventDefault(); startRef.current = { y: e.touches[0].clientY, value }; };
  const onTouchMove  = e => {
    if (!startRef.current) return; e.preventDefault();
    const raw     = startRef.current.value + (startRef.current.y - e.touches[0].clientY) / 100;
    const clamped = Math.max(0, Math.min(1, raw));
    const snapped = Math.round(clamped * (numDest - 1)) / (numDest - 1);
    onChange(snapped);
  };
  const onTouchEnd = () => { startRef.current = null; };

  // Scroll wheel also steps through destinations
  const onWheel = e => {
    e.preventDefault();
    const dir     = e.deltaY > 0 ? -1 : 1;
    const newIdx  = Math.max(0, Math.min(numDest - 1, stepIdx + dir));
    onChange(newIdx / (numDest - 1));
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6, userSelect:"none" }}>

      {/* Rotary body */}
      <div style={{ position:"relative", width:size, height:size }}>
        <svg width={size} height={size} style={{ cursor:"ns-resize", touchAction:"none" }}
          onMouseDown={onMouseDown} onTouchStart={onTouchStart}
          onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onWheel={onWheel}>
          <defs>
            <radialGradient id="destGrad" cx="35%" cy="30%" r="70%">
              <stop offset="0%" stopColor="#3A3840"/>
              <stop offset="100%" stopColor="#18161C"/>
            </radialGradient>
          </defs>

          {/* Outer ring with detent marks */}
          <circle cx={cx} cy={cx} r={cx-1} fill="url(#destGrad)"
            stroke={destColor} strokeWidth="1.5"
            style={{ filter:`drop-shadow(0 0 5px ${destColor}66)`, transition:"stroke 0.2s" }}/>

          {/* Detent tick marks at each position */}
          {DEST_OPTIONS.map((_, i) => {
            const a   = (-135 + (i / (numDest - 1)) * 270) * Math.PI / 180;
            const r1  = cx - 4;
            const r2  = cx - 8;
            const x1  = cx + r1 * Math.sin(a); const y1 = cx - r1 * Math.cos(a);
            const x2  = cx + r2 * Math.sin(a); const y2 = cx - r2 * Math.cos(a);
            const active = i === stepIdx;
            return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
              stroke={active ? destColor : DIM} strokeWidth={active ? 2 : 1}
              style={{ transition:"stroke 0.15s" }}/>;
          })}

          {/* Track arc */}
          <circle cx={cx} cy={cx} r={r} fill="none" stroke="#222" strokeWidth="1.5"/>

          {/* Position indicator dot */}
          <circle cx={dotX} cy={dotY} r="3.5" fill={destColor}
            style={{ filter:`drop-shadow(0 0 4px ${destColor})`, transition:"cx 0.15s,cy 0.15s,fill 0.2s" }}/>

          {/* Center */}
          <circle cx={cx} cy={cx} r="5" fill={destColor+"33"} stroke={destColor} strokeWidth="1"
            style={{ transition:"fill 0.2s, stroke 0.2s" }}/>
        </svg>
      </div>

      {/* OLED destination readout */}
      <div style={{
        background: OLED_BG,
        border: `1px solid ${flash ? destColor : destColor+"55"}`,
        borderRadius: 4, padding: "3px 8px",
        minWidth: 60, textAlign: "center",
        boxShadow: flash ? `0 0 10px ${destColor}99` : `0 0 4px ${destColor}33`,
        transition: "border-color 0.2s, box-shadow 0.3s",
      }}>
        <div style={{ fontSize: 7, color: DIM, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:1 }}>LFO DEST</div>
        <div style={{
          fontFamily: "'Courier New', monospace",
          fontSize: 11, fontWeight: 700,
          color: flash ? destColor : destColor+"CC",
          letterSpacing: "0.08em",
          transition: "color 0.2s",
        }}>{dest}</div>
      </div>

      {/* Step dots */}
      <div style={{ display:"flex", gap:4 }}>
        {DEST_OPTIONS.map((d, i) => (
          <div key={d}
            onClick={() => onChange(i / (numDest - 1))}
            style={{
              width: 5, height: 5, borderRadius:"50%",
              background: i === stepIdx ? DEST_COLORS[d] : DIM,
              boxShadow: i === stepIdx ? `0 0 4px ${DEST_COLORS[d]}` : "none",
              cursor: "pointer",
              transition: "background 0.15s, box-shadow 0.15s",
            }}
          />
        ))}
      </div>
    </div>
  );
}

// ─── OledLabel ────────────────────────────────────────────────────────────────
function OledLabel({ text, color, active }) {
  return (
    <div style={{ background:OLED_BG, border:`1px solid ${active?color:"#222"}`, borderRadius:3, padding:"2px 2px", width:44, textAlign:"center", transition:"border-color 0.3s,box-shadow 0.3s", boxShadow:active?`0 0 6px ${color}77`:"none", flexShrink:0 }}>
      <span style={{ fontFamily:"'Courier New',monospace", fontSize:7, fontWeight:700, letterSpacing:"0.03em", color:active?color:DIM, transition:"color 0.3s", display:"block", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
        {text || "——"}
      </span>
    </div>
  );
}

// ─── Slider ───────────────────────────────────────────────────────────────────
function Slider({ slotId, label, color, value, assigned, highlighted, onDrop, dragOver, setDragOver, onChange }) {
  const trackH = 80;
  const trackRef = useRef();
  const dragging = useRef(false);
  const valueFromY = clientY => {
    const r = trackRef.current.getBoundingClientRect();
    return Math.max(0, Math.min(1, 1 - (clientY - r.top) / r.height));
  };
  const onMouseDown = e => {
    if (!assigned) return; e.preventDefault(); dragging.current = true;
    onChange(slotId, valueFromY(e.clientY));
    const mv = e2 => { if (dragging.current) onChange(slotId, valueFromY(e2.clientY)); };
    const up = () => { dragging.current = false; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  };
  const onTouchStart = e => { if (!assigned) return; e.preventDefault(); onChange(slotId, valueFromY(e.touches[0].clientY)); };
  const onTouchMove  = e => { if (!assigned) return; e.preventDefault(); onChange(slotId, valueFromY(e.touches[0].clientY)); };
  const thumbY = (1 - value) * (trackH - 14);
  const isHov  = dragOver === slotId;
  const bc = isHov ? color : (highlighted ? color+"88" : PANEL_EDGE);
  const sh = isHov ? `0 0 10px ${color}88` : (highlighted ? `0 0 6px ${color}44` : "none");
  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3,width:46 }}
      onDragOver={e=>{e.preventDefault();setDragOver(slotId);}}
      onDragLeave={()=>setDragOver(null)}
      onDrop={e=>{e.preventDefault();setDragOver(null);onDrop(slotId,"slider");}}>
      <div ref={trackRef} onMouseDown={onMouseDown} onTouchStart={onTouchStart} onTouchMove={onTouchMove}
        style={{ width:12,height:trackH,background:"#0C0B10",borderRadius:6,position:"relative",border:`1px solid ${bc}`,boxShadow:sh,transition:"border-color 0.2s,box-shadow 0.2s",cursor:assigned?"ns-resize":"default",touchAction:"none" }}>
        <div style={{ position:"absolute",bottom:0,left:2,right:2,height:`${value*100}%`,background:assigned?color+"44":"#1A1820",borderRadius:"0 0 4px 4px",transition:"background 0.3s" }}/>
        <div style={{ position:"absolute",left:-3,top:thumbY,width:18,height:14,background:assigned?`linear-gradient(180deg,${color},${color}BB)`:"linear-gradient(180deg,#555,#333)",borderRadius:3,boxShadow:assigned?`0 0 6px ${color}66`:"0 1px 3px #000",transition:"background 0.3s,box-shadow 0.3s" }}/>
      </div>
      <span style={{ fontSize:8,color:assigned?color:DIM,fontFamily:"monospace" }}>{Math.round(value*100)}</span>
      <OledLabel text={label} color={color} active={!!assigned}/>
    </div>
  );
}

// ─── Encoder ──────────────────────────────────────────────────────────────────
function Encoder({ slotId, label, color, value, destVal, assigned, highlighted, onDrop, dragOver, setDragOver, onChange }) {
  const size = 34; const cx = size/2; const r = cx-5;
  const startRef = useRef(null);
  const isHov = dragOver === `enc-${slotId}`;

  // ROUTE block: spans two encoder slots, rendered as RouteKnob
  if (label === "SOURCE" && assigned) {
    return (
      <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3,gridColumn:"span 2" }}
        onDragOver={e=>{e.preventDefault();setDragOver(`enc-${slotId}`);}}
        onDragLeave={()=>setDragOver(null)}
        onDrop={e=>{e.preventDefault();setDragOver(null);onDrop(slotId,"encoder");}}>
        <RouteKnob
          sourceVal={value}
          destVal={destVal ?? 0}
          onSourceChange={v=>onChange(slotId, v)}
          onDestChange={v=>onChange(slotId+1, v)}
        />
      </div>
    );
  }
  // DEST slot of a ROUTE block — hidden, rendered inside RouteKnob above
  if (label === "DEST" && assigned) return <div style={{ display:"none" }}/>;

  const angle = -135 + value * 270;
  const rad   = angle * Math.PI / 180;
  const dotX  = cx + r * Math.sin(rad);
  const dotY  = cx - r * Math.cos(rad);
  const vFromDelta = (sv, sy, cy2) => Math.max(0, Math.min(1, sv + (sy - cy2) / 120));
  const onMouseDown = e => {
    if (!assigned) return; e.preventDefault();
    startRef.current = { y:e.clientY, value };
    const mv = e2 => { if (startRef.current) onChange(slotId, vFromDelta(startRef.current.value, startRef.current.y, e2.clientY)); };
    const up = () => { startRef.current=null; window.removeEventListener("mousemove",mv); window.removeEventListener("mouseup",up); };
    window.addEventListener("mousemove",mv); window.addEventListener("mouseup",up);
  };
  const onTouchStart = e => { if (!assigned) return; e.preventDefault(); startRef.current = { y:e.touches[0].clientY, value }; };
  const onTouchMove  = e => { if (!assigned||!startRef.current) return; e.preventDefault(); onChange(slotId, vFromDelta(startRef.current.value, startRef.current.y, e.touches[0].clientY)); };
  const onTouchEnd   = () => { startRef.current = null; };
  const bc = isHov ? color : (highlighted ? color+"88" : "#333");
  return (
    <div style={{ display:"flex",flexDirection:"column",alignItems:"center",gap:3 }}
      onDragOver={e=>{e.preventDefault();setDragOver(`enc-${slotId}`);}}
      onDragLeave={()=>setDragOver(null)}
      onDrop={e=>{e.preventDefault();setDragOver(null);onDrop(slotId,"encoder");}}>
      <svg width={size} height={size}
        style={{ cursor:assigned?"ns-resize":"default", filter:(isHov||highlighted)?`drop-shadow(0 0 4px ${color}88)`:"none", transition:"filter 0.2s", touchAction:"none" }}
        onMouseDown={onMouseDown} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <defs>
          <radialGradient id={`eg${slotId}`} cx="35%" cy="30%" r="70%">
            <stop offset="0%" stopColor="#444"/><stop offset="100%" stopColor="#111"/>
          </radialGradient>
        </defs>
        <circle cx={cx} cy={cx} r={cx-1} fill={`url(#eg${slotId})`} stroke={bc} strokeWidth="1.5"/>
        <circle cx={cx} cy={cx} r={r} fill="none" stroke="#222" strokeWidth="2"/>
        {assigned && <circle cx={dotX} cy={dotY} r="2.5" fill={color} style={{filter:`drop-shadow(0 0 3px ${color})`}}/>}
        <circle cx={cx} cy={cx} r="3" fill={assigned?color+"44":"#222"} stroke={assigned?color:"#333"} strokeWidth="1"/>
      </svg>
      <OledLabel text={label} color={color||DIM} active={!!assigned}/>
    </div>
  );
}

// ─── Marching ants animation ──────────────────────────────────────────────────
const MARCH_STYLE = `
@keyframes march {
  to { stroke-dashoffset: -20; }
}
`;

// ─── SliderZone ───────────────────────────────────────────────────────────────
// Wraps all 16 sliders and draws a pink bounding box around the preview group
function SliderZone({ slots, previewSlots, dragBlock, dragOver, setDragOver, onDrop, onChange }) {
  const containerRef = useRef();
  const slotRefs     = useRef([]);
  const [boxRect, setBoxRect] = useState(null);
  const color = dragBlock ? CAT[dragBlock.cat].color : PINK;

  // Recompute bounding box whenever previewSlots changes
  useEffect(() => {
    if (!previewSlots.length || !containerRef.current) { setBoxRect(null); return; }
    const containerR = containerRef.current.getBoundingClientRect();
    const rects = previewSlots
      .map(i => slotRefs.current[i]?.getBoundingClientRect())
      .filter(Boolean);
    if (!rects.length) { setBoxRect(null); return; }
    const pad = 6;
    setBoxRect({
      left:   rects[0].left   - containerR.left - pad,
      top:    rects[0].top    - containerR.top  - pad,
      width:  rects[rects.length-1].right - rects[0].left + pad * 2,
      height: rects[0].height + pad * 2,
    });
  }, [previewSlots]);

  return (
    <div ref={containerRef} style={{ position:"relative", display:"flex", gap:5, justifyContent:"center" }}
      onDragOver={e => e.preventDefault()}
      onDragLeave={e => { if (!containerRef.current?.contains(e.relatedTarget)) setDragOver(null); }}
    >
      <style>{MARCH_STYLE}</style>

      {/* Marching-ants SVG overlay */}
      {boxRect && (
        <svg style={{ position:"absolute", left:0, top:0, width:"100%", height:"100%", pointerEvents:"none", overflow:"visible", zIndex:10 }}>
          <rect
            x={boxRect.left} y={boxRect.top}
            width={boxRect.width} height={boxRect.height}
            rx="6" ry="6"
            fill={color + "18"}
            stroke={color}
            strokeWidth="1.5"
            strokeDasharray="6 4"
            style={{ animation:"march 0.4s linear infinite" }}
          />
        </svg>
      )}

      {slots.map((slot, i) => (
        <div key={i} ref={el => slotRefs.current[i] = el}>
          <Slider
            slotId={i} label={slot.label} color={slot.color||DIM}
            value={slot.value} assigned={!!slot.label}
            highlighted={previewSlots.includes(i)}
            onDrop={onDrop} dragOver={dragOver} setDragOver={setDragOver} onChange={onChange}
          />
        </div>
      ))}
    </div>
  );
}

// ─── EncoderZone ──────────────────────────────────────────────────────────────
function EncoderZone({ encoders, previewEncoders, dragBlock, dragOver, setDragOver, onDrop, onChange }) {
  const containerRef = useRef();
  const encRefs      = useRef([]);
  const [boxRect, setBoxRect] = useState(null);
  const rafRef = useRef(null);
  const color = dragBlock ? CAT[dragBlock.cat].color : PINK;

  useEffect(() => {
    if (rafRef.current) cancelAnimationFrame(rafRef.current);
    if (!previewEncoders.length || !containerRef.current) { setBoxRect(null); return; }
    rafRef.current = requestAnimationFrame(() => {
      if (!containerRef.current) return;
      const containerR = containerRef.current.getBoundingClientRect();
      const rects = previewEncoders
        .map(i => encRefs.current[i]?.getBoundingClientRect())
        .filter(Boolean);
      if (!rects.length) { setBoxRect(null); return; }
      const pad = 8;
      const left   = Math.min(...rects.map(r => r.left))   - containerR.left - pad;
      const top    = Math.min(...rects.map(r => r.top))    - containerR.top  - pad;
      const right  = Math.max(...rects.map(r => r.right))  - containerR.left + pad;
      const bottom = Math.max(...rects.map(r => r.bottom)) - containerR.top  + pad;
      setBoxRect({ left, top, width: right - left, height: bottom - top });
    });
    return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
  }, [previewEncoders.join(",")]);

  // Clear box when drag ends
  useEffect(() => { if (!dragBlock) setBoxRect(null); }, [dragBlock]);

  const handleDragOver = useCallback((e, slotId) => {
    e.preventDefault(); e.stopPropagation();
    setDragOver(`enc-${slotId}`);
  }, [setDragOver]);

  return (
    <div ref={containerRef}
      style={{ position:"relative", display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6 }}
      onDragLeave={e => { if (!containerRef.current?.contains(e.relatedTarget)) { setDragOver(null); setBoxRect(null); } }}
      onDrop={e => { e.preventDefault(); }}
    >
      {boxRect && dragBlock && (
        <svg style={{ position:"absolute", left:0, top:0, width:"100%", height:"100%", pointerEvents:"none", overflow:"visible", zIndex:10 }}>
          <rect x={boxRect.left} y={boxRect.top} width={boxRect.width} height={boxRect.height}
            rx="6" ry="6" fill={color+"18"} stroke={color} strokeWidth="1.5"
            strokeDasharray="6 4" style={{ animation:"march 0.4s linear infinite" }}/>
        </svg>
      )}
      {encoders.map((enc, i) => (
        <div key={i} ref={el => encRefs.current[i] = el}
          onDragOver={e => handleDragOver(e, i)}
          onDrop={e => { e.preventDefault(); e.stopPropagation(); setDragOver(null); setBoxRect(null); onDrop(i,"encoder"); }}
        >
          <Encoder
            slotId={i} label={enc.assigned?enc.label:enc.defaultLabel}
            color={enc.color||DIM} value={enc.value}
            destVal={encoders[i+1]?.value ?? 0}
            assigned={enc.assigned}
            highlighted={previewEncoders.includes(i)}
            onDrop={onDrop} dragOver={dragOver} setDragOver={setDragOver} onChange={onChange}
          />
        </div>
      ))}
    </div>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────
function App() {
  const engineRef = useRef(null);
  const [engineReady,setEngineReady] = useState(false);
  const [activeFreqs,setActiveFreqs] = useState(new Set());
  const [slots,setSlots]   = useState(Array.from({length:16},()=>({label:null,color:null,value:0.3+Math.random()*0.4})));
  const [encoders,setEncoders] = useState(
    ["CUTOFF","RESONANCE","ENV AMT","LFO RATE","DRIVE","REVERB","DELAY TIME","VOLUME"]
    .map(label=>({label,color:null,value:0.3+Math.random()*0.4,assigned:false,defaultLabel:label}))
  );
  const [dragBlock,setDragBlock] = useState(null);
  const [dragOver,setDragOver]   = useState(null);
  const [activeBlocks,setActiveBlocks] = useState([]);
  const [catFilter,setCatFilter] = useState("all");
  const [latch, setLatch]   = useState(false);
  const latchRef = useRef(false);
  const [octave, setOctave] = useState(0); // -2 to +2
  const latched = useRef(new Set()); // freqs held by latch

  const previewSlots    = dragBlock && dragOver !== null && typeof dragOver === "number"
    ? Array.from({length:dragBlock.params.length},(_,i)=>dragOver+i).filter(i=>i<16) : [];
  const previewEncoders = dragBlock && typeof dragOver === "string" && dragOver.startsWith("enc-")
    ? (() => { const s=parseInt(dragOver.split("-")[1]); return Array.from({length:dragBlock.params.length},(_,i)=>s+i).filter(i=>i<8); })() : [];

  const getEngine = useCallback(()=>{
    if (!engineRef.current) { engineRef.current=createEngine(); setEngineReady(true); }
    return engineRef.current;
  },[]);

  const currentOscType = useCallback(()=>{
    const b = activeBlocks.find(b=>b.cat==="osc");
    if (!b) return "sawtooth";
    if (b.id === "classic_osc") return "classic";
    return b.oscType || "sawtooth";
  },[activeBlocks]);

  const noteOn = useCallback(freq=>{
    const shifted = freq * Math.pow(2, octave);
    const eng=getEngine(); eng.noteOn(shifted, currentOscType());
    setActiveFreqs(prev=>new Set([...prev,shifted]));
    if (latchRef.current) latched.current.add(shifted);
  },[getEngine,currentOscType,octave]);

  const noteOff = useCallback(freq=>{
    const shifted = freq * Math.pow(2, octave);
    if (latchRef.current) return; // held — ignore noteOff
    if(!engineRef.current)return;
    engineRef.current.noteOff(shifted);
    setActiveFreqs(prev=>{const s=new Set(prev);s.delete(shifted);return s;});
  },[octave]);

  const toggleLatch = useCallback(()=>{
    const next = !latchRef.current;
    latchRef.current = next;
    setLatch(next);
    if (!next) {
      // Release all latched notes
      latched.current.forEach(f => {
        if (engineRef.current) engineRef.current.noteOff(f);
      });
      latched.current.clear();
      setActiveFreqs(new Set());
    }
  },[]);

  const [routes, setRoutes] = useState([]); // [{ source, dest, depth }]

  useEffect(()=>{
    if(!engineRef.current)return;
    const eng=engineRef.current;
    // Build filter chain from all active filter blocks in order
    const filterTypes = activeBlocks.filter(b=>b.filterType).map(b=>b.filterType);
    eng.setFilterChain(filterTypes);
    eng.enableDelay(activeBlocks.some(b=>b.id==="delay"));
    ["juno","rs09","mistress"].forEach(type => {
      eng.activateChorus(type, activeBlocks.some(b=>b.chorusType===type));
    });
    // Rebuild routes from ROUTE blocks in encoders
    eng.applyRoutes(routes);
  },[activeBlocks, routes]);

  const handleDrop = useCallback((slotId,target)=>{
    if(!dragBlock)return;
    const color=CAT[dragBlock.cat].color; const params=dragBlock.params;
    if(target==="slider"){
      setSlots(prev=>{const n=[...prev];for(let i=0;i<params.length&&slotId+i<16;i++)n[slotId+i]={...n[slotId+i],label:params[i],color,blockId:dragBlock.id};return n;});
    } else {
      setEncoders(prev=>{const n=[...prev];for(let i=0;i<params.length&&slotId+i<8;i++)n[slotId+i]={...n[slotId+i],label:params[i],color,assigned:true,blockId:dragBlock.id};return n;});
    }
    if(!activeBlocks.find(b=>b.id===dragBlock.id)) setActiveBlocks(prev=>[...prev,dragBlock]);
    setDragBlock(null);
  },[dragBlock,activeBlocks]);

  const handleSliderChange = useCallback((slotId,val)=>{
    setSlots(prev=>{const n=[...prev];const label=n[slotId].label;n[slotId]={...n[slotId],value:val};if(label&&engineRef.current)engineRef.current.setParam(label,val);return n;});
  },[]);

  const handleEncoderChange = useCallback((slotId,val)=>{
    setEncoders(prev=>{
      const n=[...prev];
      const label=n[slotId].label;
      n[slotId]={...n[slotId],value:val};
      if(engineRef.current) engineRef.current.setParam(label,val);
      // Rebuild routes from all SOURCE/DEST encoder pairs
      const newRoutes=[];
      for(let i=0;i<n.length-1;i++){
        if(n[i].label==="SOURCE" && n[i].assigned && n[i+1].label==="DEST" && n[i+1].assigned){
          const srcIdx=Math.round(n[i].value*(ROUTE_SOURCES.length-1));
          const dstIdx=Math.round(n[i+1].value*(ROUTE_DESTS.length-1));
          newRoutes.push({ source:ROUTE_SOURCES[srcIdx], dest:ROUTE_DESTS[dstIdx], depth:0.5 });
        }
      }
      setRoutes(newRoutes);
      if(engineRef.current) engineRef.current.applyRoutes(newRoutes);
      return n;
    });
  },[]);

  const removeBlock = useCallback((blockId) => {
    setActiveBlocks(prev => prev.filter(b => b.id !== blockId));
    // Clear any slots/encoders that had this block's params
    setSlots(prev => prev.map(s => s.blockId === blockId ? {...s, label:null, color:null, blockId:null} : s));
    setEncoders(prev => prev.map(e => e.blockId === blockId ? {...e, label:e.defaultLabel, color:null, assigned:false, blockId:null} : e));
  }, []);

  const filteredBlocks = catFilter==="all"?BLOCKS:BLOCKS.filter(b=>b.cat===catFilter);
  const cats = ["all","osc","filter","env","mod","fx"];
  const clearAll = ()=>{
    setSlots(Array.from({length:16},()=>({label:null,color:null,value:0.3+Math.random()*0.4})));
    setEncoders(["CUTOFF","RESONANCE","ENV AMT","LFO RATE","DRIVE","REVERB","DELAY TIME","VOLUME"].map(label=>({label,color:null,value:0.3+Math.random()*0.4,assigned:false,defaultLabel:label})));
    setActiveBlocks([]);
    latched.current.clear(); setActiveFreqs(new Set());
  };

  const btnStyle = (active, col) => ({
    fontSize:9, fontWeight:700, letterSpacing:"0.08em", textTransform:"uppercase",
    padding:"3px 10px", borderRadius:4, border:`1px solid ${active?(col||PINK):PANEL_EDGE}`,
    background: active ? (col||PINK)+"22" : "none",
    color: active ? (col||PINK) : DIM,
    cursor:"pointer", transition:"all 0.15s",
    boxShadow: active ? `0 0 6px ${col||PINK}44` : "none",
  });

  return (
    <div style={{ fontFamily:"'Inter','Helvetica Neue',sans-serif",background:"#0D0C10",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",padding:"24px 16px 40px",gap:24 }}>

      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:11,color:PINK,fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:4 }}>PT-1 · Virtual Demo</div>
        <div style={{ fontSize:13,color:TEXT_SEC }}>{engineReady?"Play the keys · Drag blocks onto sliders or encoders":"Press a key to start audio · Drag blocks onto sliders or encoders"}</div>
      </div>

      <div style={{ background:`linear-gradient(160deg,${BODY_BG},${PINK_DARK})`,borderRadius:16,padding:"3px",boxShadow:`0 0 0 1px ${BODY_SIDE},0 20px 60px #000C,0 0 40px ${PINK}22`,maxWidth:940,width:"100%" }}>
        <div style={{ background:`linear-gradient(160deg,${BODY_BG},#B01060)`,borderRadius:14,padding:"16px 16px 0",boxShadow:"inset 0 1px 0 #FF80C088" }}>

          <div style={{ background:PANEL,borderRadius:"10px 10px 0 0",padding:"12px 14px",display:"flex",gap:12,alignItems:"flex-start" }}>

            {/* Encoders */}
            <div style={{ display:"flex",flexDirection:"column",gap:6 }}>
              <div style={{ fontSize:8,color:dragBlock?PINK:DIM,letterSpacing:"0.1em",textTransform:"uppercase",textAlign:"center",transition:"color 0.2s" }}>ENCODERS {dragBlock&&"· drop here"}</div>
              <EncoderZone encoders={encoders} previewEncoders={previewEncoders} dragBlock={dragBlock} dragOver={dragOver} setDragOver={setDragOver} onDrop={handleDrop} onChange={handleEncoderChange}/>
            </div>

            <div style={{ width:1,background:PANEL_EDGE,alignSelf:"stretch",margin:"0 4px" }}/>

            {/* Sliders */}
            <div style={{ flex:1 }}>
              <div style={{ fontSize:8,color:dragBlock?PINK:DIM,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:8,textAlign:"center",transition:"color 0.2s" }}>SLIDERS {dragBlock?"· drop here":"· drag blocks here"}</div>
              <SliderZone slots={slots} previewSlots={previewSlots} dragBlock={dragBlock} dragOver={dragOver} setDragOver={setDragOver} onDrop={handleDrop} onChange={handleSliderChange}/>
            </div>

            <div style={{ width:1,background:PANEL_EDGE,alignSelf:"stretch",margin:"0 4px" }}/>

            {/* Joystick */}
            <div style={{ display:"flex",flexDirection:"column",gap:10,alignItems:"center",minWidth:80 }}>
              <div style={{ fontSize:8,color:DIM,letterSpacing:"0.1em",textTransform:"uppercase" }}>JOYSTICK</div>
              <Joystick/>
              <div style={{ fontSize:8,color:DIM,textAlign:"center" }}>PUSH = ASSIGN</div>
            </div>
          </div>

          <div style={{ background:PANEL,padding:"6px 14px 8px",borderTop:`1px solid ${PANEL_EDGE}` }}>
            <div style={{ fontSize:8,color:DIM,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4 }}>TOUCH STRIP</div>
            <TouchStrip/>
          </div>

          {/* Signal chain + controls bar */}
          <div style={{ background:"#0A0910",borderTop:`1px solid ${PANEL_EDGE}`,padding:"6px 14px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",minHeight:36 }}>
            {/* Latch */}
            <button onClick={toggleLatch} style={btnStyle(latch, PINK)}>
              {latch ? "⏺ LATCH ON" : "⏺ LATCH"}
            </button>
            {/* Octave */}
            <button onClick={()=>setOctave(o=>Math.max(-2,o-1))} style={btnStyle(false)} disabled={octave<=-2}>OCT ▼</button>
            <span style={{ fontSize:9, color:octave!==0?PINK:DIM, fontWeight:700, minWidth:20, textAlign:"center", letterSpacing:"0.05em" }}>
              {octave===0?"C4":octave>0?`+${octave}`:octave}
            </span>
            <button onClick={()=>setOctave(o=>Math.min(2,o+1))} style={btnStyle(false)} disabled={octave>=2}>OCT ▲</button>

            <div style={{ width:1, background:PANEL_EDGE, alignSelf:"stretch", margin:"0 2px" }}/>

            {/* Chain label */}
            {activeBlocks.length > 0 && <>
              <span style={{ fontSize:9,color:DIM,letterSpacing:"0.1em",textTransform:"uppercase" }}>CHAIN</span>
              {activeBlocks.map((b,i)=>{
                const color=CAT[b.cat].color;
                return (
                  <span key={b.id} style={{ display:"flex",alignItems:"center",gap:4 }}>
                    <span
                      draggable
                      onDragStart={e=>{ e.dataTransfer.setData("removeBlockId", b.id); }}
                      onDragEnd={e=>{ if(e.dataTransfer.dropEffect==="none") removeBlock(b.id); }}
                      title="Drag off to remove"
                      style={{ fontSize:9,fontWeight:700,color,background:color+"18",border:`1px solid ${color}55`,padding:"2px 8px",borderRadius:3,cursor:"grab",userSelect:"none",display:"flex",alignItems:"center",gap:4 }}>
                      {b.label}
                      <span
                        onClick={()=>removeBlock(b.id)}
                        style={{ fontSize:10,color:color+"99",cursor:"pointer",lineHeight:1,padding:"0 1px" }}
                        title="Remove">×</span>
                    </span>
                    {i<activeBlocks.length-1&&<span style={{ color:DIM,fontSize:10 }}>→</span>}
                  </span>
                );
              })}
            </>}

            <button onClick={clearAll} style={{ ...btnStyle(false), marginLeft:"auto" }}>CLEAR ALL</button>
          </div>

          <Piano onNoteOn={noteOn} onNoteOff={noteOff} activeFreqs={activeFreqs}/>
        </div>
      </div>

      <div style={{ maxWidth:940,width:"100%" }}>
        <div style={{ display:"flex",alignItems:"center",gap:12,marginBottom:12 }}>
          <span style={{ fontSize:11,fontWeight:700,color:WHITE,letterSpacing:"0.1em",textTransform:"uppercase" }}>Block Library</span>
          <div style={{ display:"flex",gap:4 }}>
            {cats.map(c=>(
              <button key={c} onClick={()=>setCatFilter(c)} style={{ padding:"4px 10px",borderRadius:4,border:"none",cursor:"pointer",fontSize:10,fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",background:catFilter===c?(c==="all"?PINK:CAT[c]?.color):PANEL_HI,color:catFilter===c?"#000":TEXT_SEC,transition:"all 0.15s" }}>
                {c==="all"?"ALL":CAT[c].label}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:8 }}>
          {filteredBlocks.map(b=><BlockCard key={b.id} block={b} onDragStart={setDragBlock} isDragging={dragBlock?.id===b.id}/>)}
        </div>
        <div style={{ marginTop:16,fontSize:11,color:DIM,textAlign:"center" }}>
          Drop onto sliders for fader control · Drop onto encoders for rotary control · Highlighted controls show where params will land
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
